<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERCLINIC // RI-PRO TERMINAL</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Mono', monospace;
            background-color: #0a0a0a;
            color: #a3a3a3;
            margin: 0;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanline-effect"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const DATA_SOURCE = './loot-table.json';
        const CHIP_IMAGE = './icon-chip.png';

        const App = () => {
            const [inventory, setInventory] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const response = await fetch(DATA_SOURCE);
                        if (!response.ok) throw new Error('DATA_LOAD_FAILURE');
                        const data = await response.json();
                        setInventory(data.inventory);
                        setLoading(false);
                    } catch (err) {
                        console.error(err);
                        setError("CRITICAL_SYSTEM_ERROR: UNABLE TO ACCESS LOOT_TABLE.JSON");
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <div className="text-red-600 text-xs tracking-[0.5em] animate-pulse">INITIALIZING_BIOMETRIC_LINK...</div>
                </div>
            );

            if (error) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black p-10">
                    <div className="text-red-500 text-xl font-black italic mb-4">!! ERROR !!</div>
                    <div className="text-red-900 text-xs uppercase border border-red-900 p-4">{error}</div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col select-none">
                    {/* Sticky Header */}
                    <header className="sticky top-0 z-50 bg-neutral-900/90 backdrop-blur-md border-b border-neutral-800 px-6 py-6 flex justify-between items-center">
                        <div>
                            <div className="flex items-center gap-3">
                                <div className="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse shadow-[0_0_12px_rgba(220,38,38,1)]"></div>
                                <h1 className="text-3xl md:text-4xl font-black text-white italic tracking-tighter uppercase leading-none">CYBERCLINIC</h1>
                            </div>
                            <p className="text-[9px] text-neutral-600 font-bold uppercase tracking-[0.4em] mt-2 ml-1">Ripperdoc Terminal / Sector_04 / Victor_V</p>
                        </div>
                        <div className="hidden sm:flex flex-col text-right">
                            <span className="text-[10px] text-cyan-600 font-black tracking-widest">SECURE_LINK: ACTIVE</span>
                            <span className="text-[9px] text-neutral-700 uppercase">Buffer: 1024mb</span>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-1 w-full max-w-4xl mx-auto p-4 md:p-10 space-y-12">
                        <div className="border-l-4 border-red-600 pl-4 py-1">
                            <h2 className="text-sm font-black text-neutral-500 uppercase tracking-[0.4em]">Hardware Catalog</h2>
                            <p className="text-[10px] text-neutral-700 italic uppercase">System synchronization with local loot_table success.</p>
                        </div>

                        <div className="space-y-6 pb-24">
                            {inventory.map((item, idx) => (
                                <div key={idx} className={`flex flex-col md:flex-row bg-neutral-900/40 border-l-4 ${item.color || 'border-neutral-700'} border border-neutral-800/50 hover:bg-neutral-800/60 transition-all group overflow-hidden`}>
                                    {/* Chip Image */}
                                    <div className="w-full md:w-44 aspect-video md:aspect-square bg-black/80 flex items-center justify-center border-r border-neutral-800 relative">
                                        <img 
                                            src={CHIP_IMAGE} 
                                            alt="Hardware" 
                                            className="w-full h-full object-contain p-4 opacity-70 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500"
                                            onError={(e) => e.target.src = 'https://via.placeholder.com/200?text=CHIP'}
                                        />
                                        <div className="absolute top-2 left-2 text-[8px] text-neutral-600 font-bold uppercase">ID: {idx + 101}</div>
                                    </div>

                                    {/* Info */}
                                    <div className="flex-1 p-6 flex flex-col justify-center">
                                        <div className="flex justify-between items-start mb-1">
                                            <span className="text-[10px] font-black text-cyan-600 uppercase tracking-widest">{item.category}</span>
                                            <span className="text-[9px] font-bold text-neutral-600 uppercase bg-neutral-950 px-2 py-0.5 border border-neutral-800">{item.tier}</span>
                                        </div>
                                        <h3 className="text-2xl font-black text-white italic tracking-tighter mb-4 group-hover:text-cyan-400 transition-colors uppercase">{item.name}</h3>
                                        <div className="space-y-1.5">
                                            {item.desc.map((d, i) => (
                                                <div key={i} className="flex gap-2 items-center">
                                                    <div className="w-1 h-1 bg-red-600 rounded-full"></div>
                                                    <p className="text-[11px] text-neutral-400 italic leading-tight">{d}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Pricing */}
                                    <div className="w-full md:w-44 bg-neutral-950/40 border-l border-neutral-800 p-6 flex flex-col justify-center items-center md:items-end">
                                        <span className="text-[10px] text-neutral-600 font-black uppercase tracking-tighter mb-1 italic">Price</span>
                                        <span className="text-3xl font-black text-yellow-500 tracking-tighter leading-none mb-4">§{item.price}</span>
                                        <button className="w-full bg-neutral-800 hover:bg-red-600 text-white text-[10px] font-black uppercase py-2.5 transition-all border border-neutral-700 hover:border-red-400 active:scale-95 shadow-xl">
                                            Install
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Fixed Footer */}
                    <footer className="fixed bottom-0 w-full bg-black border-t border-neutral-900 px-6 py-3 flex justify-between items-center text-[10px] text-neutral-700 font-black uppercase tracking-widest z-50">
                        <div className="flex gap-6">
                            <span className="flex items-center gap-2"><span className="w-1.5 h-1.5 bg-green-900 rounded-full"></span>Biometrics: OK</span>
                            <span className="hidden sm:inline">Sync_Protocol: ACTIVE</span>
                        </div>
                        <span>[ESC] TO DISCONNECT</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
